services:
  - type: web
    name: golfer-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_TO_STDOUT
        value: "1"
      - key: ENABLE_FILE_LOGS
        value: "0"
      - key: READ_REPLICA_ENABLED
        value: "false"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_WRITE
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: DARAJA_LIVE
        value: "false"
      - key: DARAJA_CONSUMER_KEY
        sync: false
      - key: DARAJA_CONSUMER_SECRET
        sync: false
      - key: DARAJA_SHORTCODE
        sync: false
      - key: DARAJA_PASSKEY
        sync: false
      - key: DARAJA_CALLBACK_URL
        sync: false
